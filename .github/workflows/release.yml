name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-msi-package
          path: packages/

      - uses: actions/download-artifact@v4
        with:
          name: macos-dmg-package
          path: packages
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Configure
        run: cmake -S . -B _build -DBUILD_TESTS=OFF

      - name: Build
        run: cmake --build _build

      - name: Package
        run: |
          cd _build
          cpack -G DEB
          cpack -G TGZ
          cpack -G ZIP

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb-packages
          path: |
            _build/*.deb
            _build/*.tar.gz
            _build/*.zip

  build-rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ rpm

      - name: Configure
        run: cmake -S . -B _build -DBUILD_TESTS=OFF

      - name: Build
        run: cmake --build _build

      - name: Package
        run: cd _build && cpack -G RPM

      - uses: actions/upload-artifact@v4
        with:
          name: linux-rpm-packages
          path: _build/*.rpm
  build-msi:
      runs-on: windows-latest
      steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B _build -DBUILD_TESTS=OFF

      - name: Build
        run: cmake 
  release:
    needs: [build-deb, build-rpm, build-msi, build-dmg]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-deb-packages
          path: packages/

      - uses: actions/download-artifact@v4
        with:
          name: linux-rpm-packages
          path: packages/

      - name: List packages
        run: ls -la packages/

      - uses: softprops/action-gh-release@v2
        with:
          files: packages/*
          generate_release_notes: true
   
